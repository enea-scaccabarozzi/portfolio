name: Release

on:
    push:
        branches: [main]

jobs:
    ci:
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2
            - run: bun install --frozen-lockfile
            - run: bun run check
            - run: bunx tsc --noEmit
            - run: bun run build
            - uses: actions/upload-artifact@v4
              with:
                  name: build-output
                  path: out/

    deploy:
        needs: ci
        runs-on: ubuntu-latest
        permissions:
            pages: write
            id-token: write
        environment:
            name: github-pages
            url: ${{ steps.deploy.outputs.page_url }}
        steps:
            - uses: actions/download-artifact@v4
              with:
                  name: build-output
                  path: out/
            - uses: actions/upload-pages-artifact@v3
              with:
                  path: out/
            - id: deploy
              uses: actions/deploy-pages@v4

    release:
        needs: ci
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
        outputs:
            release_created: ${{ steps.release.outputs.release_created }}
            tag_name: ${{ steps.release.outputs.tag_name }}
            version: ${{ steps.release.outputs.version }}
        steps:
            - uses: actions/checkout@v4
            - id: release
              uses: googleapis/release-please-action@v4
              with:
                  release-type: node

    publish:
        needs: [ci, release]
        if: needs.release.outputs.release_created == 'true'
        runs-on: ubuntu-latest
        permissions:
            contents: write
            packages: write
        steps:
            - uses: actions/checkout@v4
            - uses: actions/download-artifact@v4
              with:
                  name: build-output
                  path: out/

            - uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - uses: docker/build-push-action@v6
              with:
                  context: .
                  push: true
                  tags: |
                      ghcr.io/enea-scaccabarozzi/portfolio:${{ needs.release.outputs.version }}
                      ghcr.io/enea-scaccabarozzi/portfolio:latest

            - run: tar -czf portfolio-${{ needs.release.outputs.version }}.tar.gz -C out .
            - uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ needs.release.outputs.tag_name }}
                  files: portfolio-${{ needs.release.outputs.version }}.tar.gz
