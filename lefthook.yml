pre-commit:
  commands:
    format:
      glob: "**/*.{ts,tsx,js,jsx,json,css,mjs}"
      run: bunx biome format --write {staged_files}
      stage_fixed: true
    check:
      glob: "**/*.{ts,tsx,js,jsx,json,css,mjs}"
      run: bunx biome check {staged_files}
      stage_fixed: true

commit-msg:
  commands:
    commitlint:
      run: bunx commitlint --edit {1}

pre-push:
  commands:
    format-check:
      run: bun run format:check
    check:
      run: bun run check
    tsc:
      run: bunx tsc --noEmit
    build:
      run: bun run build
